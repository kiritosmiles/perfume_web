services:
  postgres:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: perfume
      POSTGRES_PASSWORD: ${DB_PASSWORD:-perfume_dev}
      POSTGRES_DB: perfume
    ports: ["127.0.0.1:5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perfume"]
      interval: 5s
      retries: 3
      start_period: 5s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-perfume_dev}
    ports: ["127.0.0.1:6379:6379"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-perfume_dev}", "ping"]
      interval: 5s
      retries: 3
      start_period: 5s

  neo4j:
    image: neo4j:2025-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-perfume_dev}
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:17687:7687"
    volumes:
      - neo4jdata:/data
      - ./neo4j/import:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-perfume_dev} 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 15s
      retries: 5
      start_period: 30s

  worker_l2:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: perfume
      DB_PASSWORD: ${DB_PASSWORD:-perfume_dev}
      DB_NAME: perfume
      REDIS_URL: redis://:${REDIS_PASSWORD:-perfume_dev}@redis:6379
    command: python -m scripts.worker_l2
    networks:
      - default

  cron_l3:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: perfume
      DB_PASSWORD: ${DB_PASSWORD:-perfume_dev}
      DB_NAME: perfume
      REDIS_URL: redis://:${REDIS_PASSWORD:-perfume_dev}@redis:6379
    entrypoint: >
      sh -c '
      while true; do
        HOUR=$$(date +%H)
        if [ "$$HOUR" = "03" ]; then
          python -m scripts.consolidate_l3 --date $$(date +%Y-%m-%d)
        fi
        sleep 3600
      done'
    networks:
      - default

volumes:
  pgdata:
  redisdata:
  neo4jdata:
