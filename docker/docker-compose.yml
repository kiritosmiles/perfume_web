services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: perfume
      POSTGRES_PASSWORD: ${DB_PASSWORD:-perfume_dev}
      POSTGRES_DB: perfume
    ports: ["127.0.0.1:5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perfume"]
      interval: 5s

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-perfume_dev}
    ports: ["127.0.0.1:6379:6379"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-perfume_dev}", "ping"]
      interval: 5s
      retries: 3
      timeout: 10s
      start_period: 10s

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-perfume_dev}
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    volumes:
      - neo4jdata:/data
      - ./neo4j/import:/var/lib/neo4j/import

volumes:
  pgdata:
  redisdata:
  neo4jdata:
