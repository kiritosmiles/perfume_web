name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  backend:
    name: Backend — pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run tests (unit)
        run: poetry run pytest tests/ -v -m "not e2e"

  frontend:
    name: Frontend — typecheck + vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install from root workspace
        run: |
          cd ../..
          npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Vitest
        run: npx vitest run
